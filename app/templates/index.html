<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/beercss@3.0.8/dist/cdn/beer.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
        <title>Crypto Brella</title>
    </head>
    <body class="grey1">
        <main class="responsive" id="app">
            <h1 class="center-align middle-align bold small">Crypto Brella</h1>
            <h4 class="center-align middle-align bold small">Cipher Toolbox</h4>

            <div class="field prefix large-width center">
                <i>search</i>
                <input type="search" v-model.trim="searchQuery" @keydown.enter="openSingleMatch">
            </div>

            <p v-if="searchQuery.trim() && filteredSections.length === 0" class="center-align small">
                No matches
            </p>

            <div class="grid no-space">
                <template v-for="section in filteredSections">
                    <div :key="section.id + '-header'" class="teal s12">
                        <h5 class="white-text small center-align middle-align">[[ section.title ]]</h5>
                    </div>

                    <template v-for="category in section.categories">
                        <div
                            v-if="section.categories.length > 1"
                            :key="section.id + '-' + category.id + '-title'"
                            class="blue-grey10 s12"
                        >
                            <h6 class="white-text small center-align middle-align">[[ category.title ]]</h6>
                        </div>

                        <div
                            :key="section.id + '-' + category.id + '-tools'"
                            class="blue-grey10 s12 elevate"
                        >
                            <div class="grid no-space">
                                <a
                                    v-for="tool in category.tools"
                                    :key="tool.id"
                                    :href="tool.path"
                                    target="_blank"
                                    class="vertical center-align s3 m2 l2"
                                    :title="tool.description"
                                >
                                    <img class="circle" :src="'/static/image/' + tool.icon" :alt="tool.name">
                                    <p class="white-text">[[ tool.name ]]</p>
                                </a>
                            </div>
                        </div>
                    </template>

                    <div :key="section.id + '-spacer'" class="grey1 s12"><br></div>
                </template>
            </div>

            <p class="center-align">Contact: a3xgvo
                <a href="https://twitter.com/a3xgvo" target="_blank" class="link">Twitter</a>
                <a href="https://a3xgvo-weblog.blogspot.com" target="_blank" class="link">Blog</a>
            </p>
        </main>

        <script>
            var app = new Vue({
                el: '#app',
                data: {
                    sections: {{ catalog_sections | tojson }},
                    searchQuery: '',
                },
                computed: {
                    filteredSections: function() {
                        var query = this.searchQuery.trim().toLowerCase();

                        if (!query) {
                            return this.sections;
                        }

                        return this.sections
                            .map(function(section) {
                                var categories = section.categories
                                    .map(function(category) {
                                        var tools = category.tools.filter(function(tool) {
                                            return [
                                                tool.name,
                                            ]
                                                .concat(tool.aliases || [])
                                                .concat(tool.tags || [])
                                                .filter(Boolean)
                                                .join(' ')
                                                .toLowerCase()
                                                .indexOf(query) !== -1;
                                        });

                                        return Object.assign({}, category, { tools: tools });
                                    })
                                    .filter(function(category) {
                                        return category.tools.length > 0;
                                    });

                                return Object.assign({}, section, { categories: categories });
                            })
                            .filter(function(section) {
                                return section.categories.length > 0;
                            });
                    },
                    filteredTools: function() {
                        return this.filteredSections.reduce(function(tools, section) {
                            return tools.concat(
                                section.categories.reduce(function(categoryTools, category) {
                                    return categoryTools.concat(category.tools);
                                }, [])
                            );
                        }, []);
                    },
                },
                methods: {
                    openSingleMatch: function(event) {
                        if (this.filteredTools.length === 0) {
                            return;
                        }

                        event.preventDefault();
                        window.open(this.filteredTools[0].path, '_blank');
                    },
                },
                delimiters: ['[[', ']]']
            });
        </script>
    </body>
</html>
